<!DOCTYPE html>
<html>
<head>
    <title>TechDisc Graph</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: monospace; }
        #canvas-container { width: 100%; height: 400px; }
    </style>
</head>
<body>
    <button onclick="connect()">Connect</button>
    <div id="canvas-container"><canvas id="chart"></canvas></div>
    <script>
        const ctx = document.getElementById('chart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{label:'AX', data:[], borderColor:'red'}, {label:'AY', data:[], borderColor:'green'}, {label:'AZ', data:[], borderColor:'blue'}]},
            options: { animation: false, scales: { y: { min: -20, max: 20 } } }
        });

        async function connect() {
            const device = await navigator.bluetooth.requestDevice({filters: [{name:'TechDisc-V2'}], optionalServices: ["31303079-7274-656d-656c-655463736944"]});
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService("31303079-7274-656d-656c-655463736944");
            const char = await service.getCharacteristic("32303079-7274-656d-656c-655463736944");
            char.startNotifications();
            char.addEventListener('characteristicvaluechanged', (e) => {
                const v = e.target.value;
                const ax = v.getFloat32(0, true), ay = v.getFloat32(4, true), az = v.getFloat32(8, true);
                const time = new Date().toLocaleTimeString();
                chart.data.labels.push(time);
                [ax, ay, az].forEach((d, i) => chart.data.datasets[i].data.push(d));
                if(chart.data.labels.length > 100) { chart.data.labels.shift(); chart.data.datasets.forEach(s => s.data.shift()); }
                chart.update('none');
            });
        }
    </script>
</body>
</html>
