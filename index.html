<!DOCTYPE html>
<html>
<head>
    <title>TechDisc Live</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin:0; background:#000; color:#fff; font-family:monospace; }
        #view { width:100vw; height:60vh; }
        .ui { padding:20px; }
    </style>
</head>
<body>
    <div id="view"></div>
    <div class="ui">
        <button id="btn">CONNECT</button>
        <div id="stats"></div>
    </div>
<script>
    const scene = new THREE.Scene();
    const cam = new THREE.PerspectiveCamera(75, window.innerWidth/400, 0.1, 1000);
    const ren = new THREE.WebGLRenderer();
    ren.setSize(window.innerWidth, 400);
    document.getElementById('view').appendChild(ren.domElement);

    const disc = new THREE.Mesh(new THREE.CylinderGeometry(2,2,0.2), new THREE.MeshNormalMaterial());
    scene.add(disc);
    cam.position.z = 5;

    function animate() { requestAnimationFrame(animate); ren.render(scene, cam); }
    animate();

    document.getElementById('btn').onclick = async () => {
        const dev = await navigator.bluetooth.requestDevice({
            filters: [{ name: 'TechDisc' }],
            optionalServices: ['4b494e47-534d-4152-5444-4953-43000000']
        });
        const serv = await (await dev.gatt.connect()).getPrimaryService('4b494e47-534d-4152-5444-4953-43000000');
        const char = await serv.getCharacteristic('4b494e47-534d-4152-5444-4953-43000001');
        char.startNotifications();
        char.oncharacteristicvaluechanged = (e) => {
            const v = new DataView(e.target.value.buffer);
            // Packet: 12 floats (48b) + 2 uint8 (2b)
            const q0 = v.getFloat32(0, true);
            const q1 = v.getFloat32(4, true);
            const q2 = v.getFloat32(8, true);
            const q3 = v.getFloat32(12, true);
            
            disc.quaternion.set(q1, q2, q3, q0); // Three.js uses xyzw
            
            document.getElementById('stats').innerText = `Speed: ${v.getFloat32(40, true).toFixed(1)} | Spin: ${v.getFloat32(36, true).toFixed(0)}`;
        };
    };
</script>
</body>
</html>
