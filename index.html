<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechDisc Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 0; }
        .nav { display: flex; background: #1e1e1e; padding: 10px; border-bottom: 2px solid #333; }
        .nav button { background: #333; color: #fff; border: none; padding: 10px 20px; margin-right: 10px; cursor: pointer; border-radius: 4px; }
        .nav button.active { background: #007bff; }
        .container { padding: 20px; display: none; }
        .active-tab { display: block; }
        .card { background: #1e1e1e; padding: 20px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; }
        .metric { font-size: 24px; font-weight: bold; color: #007bff; }
        #battery-warning { color: #ff4444; font-weight: bold; display: none; margin-left: auto; align-self: center; padding-right: 20px;}
        #connect-btn { background: #28a745; margin-bottom: 20px; width: 100%; font-size: 18px; padding: 15px; border: none; color: white; cursor: pointer; border-radius: 8px;}
        #canvas-container { width: 100%; height: 60vh; background: #000; border-radius: 8px; overflow: hidden;}
        #debug-log { width: 100%; height: 200px; background: #000; color: #0f0; font-family: monospace; overflow-y: scroll; padding: 10px; border: 1px solid #333; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="nav">
        <button id="tab-data" class="active" onclick="switchTab('data')">Flight Data</button>
        <button id="tab-3d" onclick="switchTab('3d')">3D Live View</button>
        <div id="battery-warning">⚠ LOW BATTERY</div>
    </div>

    <div style="padding: 20px;">
        <button id="connect-btn" onclick="connectBluetooth()">Connect to Disc</button>
    </div>

    <div id="data" class="container active-tab">
        <div class="card">
            <h3>Release Metrics (Updates on Throw)</h3>
            <p>Speed: <span id="val-speed" class="metric">0.0</span> mph</p>
            <p>Spin: <span id="val-spin" class="metric">0.0</span> rpm</p>
            <p>Wobble: <span id="val-wobble" class="metric">0.0</span> °/s</p>
            <p>Hyzer Angle: <span id="val-hyzer" class="metric">0.0</span> °</p>
            <p>Nose Angle: <span id="val-nose" class="metric">0.0</span> °</p>
            <p>Launch Angle: <span id="val-launch" class="metric">0.0</span> °</p>
        </div>
        <div class="card">
            <h3>Flight Estimation</h3>
            <p>Estimated Distance: <span id="val-dist" class="metric">0.0</span> m</p>
            <p>Flight Duration: <span id="val-time" class="metric">0.0</span> s</p>
        </div>
        <div class="card">
            <h3>Raw Data Stream (Debug)</h3>
            <div id="debug-log"></div>
        </div>
    </div>

    <div id="3d" class="container">
        <div class="card">
            <h3>Live Disc Orientation</h3>
            <div id="canvas-container"></div>
        </div>
    </div>

<script>
    function switchTab(tabId) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active-tab'));
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active-tab');
        document.getElementById('tab-' + tabId).classList.add('active');
    }

    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    const geometry = new THREE.CylinderGeometry(5, 5, 0.5, 32);
    const material = new THREE.MeshBasicMaterial({ color: 0x007bff, wireframe: true });
    const discMesh = new THREE.Mesh(geometry, material);
    scene.add(discMesh);
    
    const axesHelper = new THREE.AxesHelper(8);
    discMesh.add(axesHelper);
    
    camera.position.set(0, 10, 10);
    camera.lookAt(0, 0, 0);

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    const debugLog = document.getElementById('debug-log');
    function logDebug(message) {
        debugLog.innerText += message + '\n';
        debugLog.scrollTop = debugLog.scrollHeight;
    }

    const SERVICE_UUID = "44697363-5465-6c65-6d65-747279303031";
    const CHAR_UUID = "44697363-5465-6c65-6d65-747279303032";

    async function connectBluetooth() {
        try {
            logDebug("[SYS] Initiating connection...");
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: "TechDisc" }],
                optionalServices: [SERVICE_UUID]
            });
            
            logDebug(`[SYS] Device selected: ${device.name}`);
            const server = await device.gatt.connect();
            logDebug("[SYS] GATT server connected.");
            
            const service = await server.getPrimaryService(SERVICE_UUID);
            const characteristic = await service.getCharacteristic(CHAR_UUID);
            logDebug("[SYS] Service and Characteristic resolved.");
            
            characteristic.startNotifications();
            characteristic.addEventListener('characteristicvaluechanged', handleData);
            logDebug("[SYS] Subscribed to notifications.");
            
            document.getElementById('connect-btn').innerText = "Connected";
            document.getElementById('connect-btn').style.background = "#0056b3";
            
            device.addEventListener('gattserverdisconnected', () => {
                document.getElementById('connect-btn').innerText = "Connect to Disc";
                document.getElementById('connect-btn').style.background = "#28a745";
                logDebug("[SYS] Disconnected.");
            });
            
        } catch (error) {
            logDebug(`[ERR] ${error.message}`);
        }
    }

    function handleData(event) {
        const value = event.target.value;
        if (value.byteLength < 26) return;

        const speed = value.getFloat32(0, true);
        const spin = value.getFloat32(4, true);
        const wobble = value.getFloat32(8, true);
        const hyzer = value.getFloat32(12, true);
        const nose = value.getFloat32(16, true);
        const launch = value.getFloat32(20, true);
        const battery = value.getUint8(24);
        const state_flag = value.getUint8(25);

        if (document.getElementById('data').classList.contains('active-tab')) {
            logDebug(`[DATA] Spd:${speed.toFixed(1)} Spin:${spin.toFixed(0)} Hyz:${hyzer.toFixed(1)} Nos:${nose.toFixed(1)} Bat:${battery}% St:${state_flag}`);
        }

        const warnTag = document.getElementById('battery-warning');
        if (battery < 10) {
            warnTag.style.display = "block";
            warnTag.innerText = `⚠ LOW BATTERY (${battery}%)`;
        } else {
            warnTag.style.display = "none";
        }

        discMesh.rotation.order = 'YXZ';
        discMesh.rotation.z = THREE.MathUtils.degToRad(-hyzer);
        discMesh.rotation.x = THREE.MathUtils.degToRad(nose);
        
        discMesh.rotation.y += THREE.MathUtils.degToRad(spin * (0.05 / 60) * 360);

        if (state_flag === 1) {
            document.getElementById('val-speed').innerText = speed.toFixed(1);
            document.getElementById('val-spin').innerText = spin.toFixed(0);
            document.getElementById('val-wobble').innerText = wobble.toFixed(1);
            document.getElementById('val-hyzer').innerText = hyzer.toFixed(1);
            document.getElementById('val-nose').innerText = nose.toFixed(1);
            document.getElementById('val-launch').innerText = launch.toFixed(1);

            const v0_mps = speed * 0.44704; 
            const theta_rad = THREE.MathUtils.degToRad(launch > 0 ? launch : 0);
            const g = 9.81;
            
            const time_flight = (2 * v0_mps * Math.sin(theta_rad)) / g;
            const distance_m = (v0_mps * v0_mps * Math.sin(2 * theta_rad)) / g;

            document.getElementById('val-dist').innerText = distance_m > 0 ? distance_m.toFixed(1) : "0.0";
            document.getElementById('val-time').innerText = time_flight > 0 ? time_flight.toFixed(2) : "0.0";
        }
    }
</script>
</body>
</html>
